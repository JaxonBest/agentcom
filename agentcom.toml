# agentcom configuration
# Define your agent fleet here. Run `agentcom up` to start it.

project_name = "agentcom-src"
default_provider = "claude"
default_model = "sonnet"
auto_commit = true
# max_total_budget_usd = 20.0

[[agent]]
name = "builder"
role = "Implements features and fixes. Owns src/. Coordinates with reviewer before large refactors."
# IMPORTANT: agents run headless, so nobody can answer permission prompts —
# any tool NOT listed here is auto-denied. (`agentcom` coordination commands
# are always allowed regardless.) Narrow Bash rules like "Bash(npm test:*)"
# work too.
allowed_tools = ["Bash", "Read", "Edit", "Write", "Glob", "Grep"]
model = "claude-sonnet-4-6"
# cwd = "."                      # working dir, relative to this file
# provider = "claude"            # or "codex" or "deepseek"
# model = "sonnet"
# permission_mode = "acceptEdits"  # or "plan", "default", "bypassPermissions"
# max_turns_per_prompt = 50
# max_budget_usd = 10.0
# auto_restart = true

[[agent]]
name = "reviewer"
role = "Reviews changes made by other agents, runs tests, and files follow-up tasks for problems found."
allowed_tools = ["Bash", "Read", "Glob", "Grep"]

[[agent]]
name = "junior-developer"
role = "Given clear instructions to do large amounts of code that require little reasoning. The task should be delegated to you. If builder, builder-assistant, or software-engineer are free. Wait to see if they want it first. Do not wait to see if they want it first if the task appears easy to implement."
allowed_tools = ["Bash", "Read", "Edit", "Write", "Glob", "Grep"]
provider = "deepseek"
model = "deepseek-reasoner"
permission_mode = "acceptEdits"
auto_restart = true

[[agent]]
name = "builder-assistant"
role = "Assist the builder with anything that he needs done. If he is not busy, do not claim."
allowed_tools = ["Bash", "Read", "Edit", "Write", "Glob", "Grep"]
permission_mode = "acceptEdits"
auto_restart = true

[[agent]]
name = "software-engineer"
role = "A software engineer who is designed to pick up any task that requires simple or basic implementation."
allowed_tools = ["Bash", "Read", "Edit", "Write", "Glob", "Grep"]
permission_mode = "acceptEdits"
auto_restart = true

[[agent]]
name = "junior-developer-assistant"
role = "Junior developers backup coder. Only claim if Junior Developer is busy, AND if the task is a <=6/10 difficulty to implement. It must not contain anything to do with security."
allowed_tools = ["Bash", "Read", "Edit", "Write", "Glob", "Grep"]
permission_mode = "acceptEdits"
provider = "deepseek"
auto_restart = true

[[agent]]
name = "security"
role = "When a task is labeled security, or has a problem that needs to be fixed for security reasons. Claim the task. Do not claim the task if not."
allowed_tools = ["Bash", "Read", "Edit", "Write", "Glob", "Grep"]
permission_mode = "acceptEdits"
auto_restart = true
