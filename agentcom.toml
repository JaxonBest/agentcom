# agentcom configuration — tightened, quality-gated fleet.
# Run `agentcom up` to start it.
#
# This config deliberately wires up the quality mechanisms agentcom ships but
# that the previous 7-agent config left OFF:
#   • lanes            — restrict which files each agent may claim (no sprawl)
#   • review gate      — the builder's work must pass a reviewer before Done
#   • post_close hook   — every closed task is verified with cargo test + clippy
# Fewer, well-scoped, gated agents beat many loosely-scoped ones.

project_name = "agentcom-src"
default_provider = "claude"
default_model = "sonnet"
auto_commit = true
# max_total_budget_usd = 20.0

# Verify every task close by building + testing + linting the tree. A non-zero
# exit re-blocks the task with the hook's stderr as the reason, so broken work
# never reaches Done. (Circuit breaker stops after 2 failed attempts.)
[hooks]
post_close = "cargo test --quiet && cargo clippy --quiet --all-targets -- -D warnings"
post_close_timeout_secs = 600

# ── builder ───────────────────────────────────────────────────────────────
# Primary implementer. Owns src/ and the crate manifest. Its closes are
# review-gated: closing a task moves it to AwaitingReview and the hub auto-files
# a review task assigned to an agent with the "review" capability (below).
[[agent]]
name = "builder"
role = "Implements features and fixes. Owns src/ and Cargo manifests. Claims one task at a time and writes focused, well-tested changes."
allowed_tools = ["Bash", "Read", "Edit", "Write", "Glob", "Grep"]
permission_mode = "acceptEdits"
lanes = ["src/**", "Cargo.toml", "Cargo.lock"]
default_review_required = true
max_claimed_tasks = 1

# ── reviewer ──────────────────────────────────────────────────────────────
# Read-only: can run cargo test/clippy and read code, but cannot edit — so it
# critiques rather than rewrites. The "review" capability is REQUIRED for the
# hub's review gate to route auto-filed review tasks here.
[[agent]]
name = "reviewer"
role = "Reviews other agents' changes, runs tests/clippy, and approves or rejects review tasks. Files follow-up tasks for any problems found."
allowed_tools = ["Bash", "Read", "Glob", "Grep"]
capabilities = ["review"]

# ── tester ────────────────────────────────────────────────────────────────
# Owns the test suite. May touch tests/ and the #[cfg(test)] modules in src/.
[[agent]]
name = "tester"
role = "Writes and maintains tests. Owns tests/ and unit-test modules in src/. Adds coverage for new behavior and regressions."
allowed_tools = ["Bash", "Read", "Edit", "Write", "Glob", "Grep"]
permission_mode = "acceptEdits"
lanes = ["tests/**", "src/**"]

# ── security ──────────────────────────────────────────────────────────────
# Claims security-labeled tasks. Also review-capable, so it can back up the
# reviewer on security-sensitive changes.
[[agent]]
name = "security"
role = "Claims tasks labeled security, or with a security-relevant defect. Does not claim non-security tasks unless explicitly asked."
allowed_tools = ["Bash", "Read", "Edit", "Write", "Glob", "Grep"]
permission_mode = "acceptEdits"
lanes = ["src/**", "Cargo.toml", "Cargo.lock"]
capabilities = ["security", "review"]

# ── optional: cost-optimized worker ─────────────────────────────────────────
